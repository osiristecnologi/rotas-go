<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum-Resistant DeX</title>

<style>
body{
  background:#000;
  color:#0f0;
  font-family:monospace;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

h2{
  color:#00ff99;
}

button{
  padding:12px 20px;
  background:#00ff99;
  border:none;
  cursor:pointer;
  font-weight:bold;
  border-radius:5px;
}

button:hover{
  background:#00cc77;
}

pre{
  margin-top:20px;
  background:#050505;
  padding:15px;
  border-radius:5px;
  min-height:200px;
  white-space:pre-wrap;
}

.success{ color:#00ff99; }
.error{ color:#ff4444; }
.info{ color:#00ccff; }

.loading{
  animation: blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Quantum-Resistant DeX (ML-KEM Simulation)</h2>
  <button onclick="runDex()">Run Secure Swap</button>

  <pre id="output"></pre>
</div>

<script>
// ===== Utils =====
function randomBytes(size){
  const arr = new Uint8Array(size);
  crypto.getRandomValues(arr);
  return arr;
}

async function sha256(data){
  const hash = await crypto.subtle.digest("SHA-256", data);
  return new Uint8Array(hash);
}

function concat(a, b){
  const c = new Uint8Array(a.length + b.length);
  c.set(a, 0);
  c.set(b, a.length);
  return c;
}

function hex(bytes){
  return Array.from(bytes)
    .map(b => b.toString(16).padStart(2,'0'))
    .join('');
}

function sleep(ms){
  return new Promise(res => setTimeout(res, ms));
}

// ===== ML-KEM SIM (CORRIGIDO) =====
const ML_KEM_Sim = {

  keygen(){
    const pk = randomBytes(1184);
    const sk = randomBytes(2400);
    return {pk, sk};
  },

  async encaps(pk){
    const shared = randomBytes(32);

    // segredo embutido no ciphertext
    const ct = concat(shared, randomBytes(1088));

    return {shared, ct};
  },

  async decaps(sk, ct){
    // recupera o mesmo segredo
    return ct.slice(0,32);
  }
};

// ===== DeX FLOW =====
async function runDex(){
  const out = document.getElementById("output");

  function log(msg, cls=""){
    const span = document.createElement("div");
    span.className = cls;
    span.textContent = msg;
    out.appendChild(span);
    out.scrollTop = out.scrollHeight;
  }

  out.innerHTML = "";
  log("Running...", "loading");

  await sleep(500);

  log("\n🚀 Quantum-Resistant DeX - Simulation\n");

  // Alice
  const {pk: alice_pk, sk: alice_sk} = ML_KEM_Sim.keygen();
  log("Alice Public Key: " + hex(alice_pk.slice(0,16)) + "...", "info");

  await sleep(400);

  // Bob
  const {shared: shared_bob, ct} = await ML_KEM_Sim.encaps(alice_pk);
  log("Bob Ciphertext: " + hex(ct.slice(0,16)) + "...", "info");

  await sleep(400);

  // Alice decaps
  const shared_alice = await ML_KEM_Sim.decaps(alice_sk, ct);

  await sleep(300);

  // Verificação
  if(hex(shared_alice) !== hex(shared_bob)){
    log("❌ Key exchange failed!", "error");
    return;
  }

  log("✅ Shared Secret established (Post-Quantum)", "success");

  await sleep(400);

  // Derivação
  const symmetric = await sha256(shared_alice);
  log("🔑 Symmetric Key: " + hex(symmetric.slice(0,16)) + "...", "success");

  await sleep(400);

  // Simulação swap
  log("🔄 Encrypting transaction...", "info");
  await sleep(500);

  log("📡 Sending securely...", "info");
  await sleep(500);

  log("\n🎉 Swap completed (Quantum-safe simulation)", "success");
}
</script>

</body>
</html>
