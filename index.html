<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum-Resistant DeX</title>

<style>
body{
  background:#000;
  color:#0f0;
  font-family:monospace;
  padding:20px;
}
button{
  padding:10px 20px;
  background:#0f0;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
pre{
  margin-top:20px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>🚀 Quantum-Resistant DeX (ML-KEM Simulation)</h2>
<button onclick="runDex()">Run Secure Swap</button>

<pre id="output"></pre>

<script>
// ===== Utils =====
function randomBytes(size){
  const arr = new Uint8Array(size);
  crypto.getRandomValues(arr);
  return arr;
}

async function sha256(data){
  const hash = await crypto.subtle.digest("SHA-256", data);
  return new Uint8Array(hash);
}

async function sha3_sim(data){
  // Navegador não tem SHA3 nativo → usamos SHA-256 como simulação
  return sha256(data);
}

function concat(a, b){
  const c = new Uint8Array(a.length + b.length);
  c.set(a, 0);
  c.set(b, a.length);
  return c;
}

function hex(bytes){
  return Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ===== ML-KEM SIM =====
const ML_KEM_Sim = {

  keygen(){
    const pk = randomBytes(1184);
    const sk = randomBytes(2400);
    return {pk, sk};
  },

  async encaps(pk){
    const shared = randomBytes(32);

    const hash = await sha3_sim(concat(pk, shared));
    const ct = concat(hash, randomBytes(1088));

    return {shared, ct};
  },

  async decaps(sk, ct){
    const part1 = sk.slice(0,32);
    const part2 = ct.slice(0,32);

    return await sha3_sim(concat(part1, part2));
  }
};

// ===== DeX FLOW =====
async function runDex(){
  const out = document.getElementById("output");
  out.textContent = "Running...\n\n";

  function log(msg){
    out.textContent += msg + "\n";
  }

  log("🚀 Quantum-Resistant DeX - Simulation\n");

  // Alice
  const {pk: alice_pk, sk: alice_sk} = ML_KEM_Sim.keygen();
  log("Alice Public Key: " + hex(alice_pk.slice(0,16)) + "...");

  // Bob
  const {shared: shared_bob, ct} = await ML_KEM_Sim.encaps(alice_pk);
  log("Bob Ciphertext: " + hex(ct.slice(0,16)) + "...");

  // Alice decaps
  const shared_alice = await ML_KEM_Sim.decaps(alice_sk, ct);

  // Verificação
  if(hex(shared_alice) !== hex(shared_bob)){
    log("❌ Key exchange failed!");
    return;
  }

  log("✅ Shared Secret established (Post-Quantum)");

  // Derivação de chave
  const symmetric = await sha256(shared_alice);
  log("🔑 Symmetric Key: " + hex(symmetric.slice(0,16)) + "...");

  // Simulação de swap
  log("🔄 Swap encrypted and sent securely");
  log("\n🎉 Swap completed (Quantum-safe simulation)");
}
</script>

</body>
