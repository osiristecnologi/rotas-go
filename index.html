<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Go</title>
    <link rel="stylesheet" href="style.css">
    <!-- Mapbox Token Público (Seguro) -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css' rel='stylesheet' />
</head>
<body>
    
    <!-- Container Principal -->
    <div id="app-container">
        
        <!-- Tela Home (Exemplo) -->
        <div id="screen-home" class="screen active">
            <header>
                <h1>Rotas Go</h1>
            </header>
            <div id="map"></div>
            <!-- Conteúdo de anúncios aqui -->
        </div>

        <!-- Tela Publicar -->
        <div id="screen-publish" class="screen" style="display:none;">
            <header>
                <button id="btn-back-publish" class="btn-icon">←</button>
                <h2>Novo Anúncio</h2>
            </header>
            
            <form id="adForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Fotos (Máx 2 para grátis)</label>
                    <input type="file" id="photos" name="photos" multiple accept="image/*">
                    <small id="photo-error" class="error-text"></small>
                </div>

                <div class="form-group">
                    <label>Título</label>
                    <input type="text" name="title" required placeholder="Ex: Pizzaria Bella">
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select name="category">
                        <option value="restaurante">Restaurante</option>
                        <option value="mercado">Mercado</option>
                        <option value="farmacia">Farmácia</option>
                    </select>
                </div>

                <button type="submit" id="btn-submit-ad" class="btn-primary">Publicar</button>
            </form>
        </div>

        <!-- Tela Premium (Modal Interface) -->
        <div id="screen-premium" class="screen modal" style="display:none;">
            <div class="modal-content">
                <button id="btn-close-premium" class="btn-close">×</button>
                <h2>Seja Premium</h2>
                <p>Aumente sua visibilidade.</p>
                <ul>
                    <li>Até 5 anúncios ativos</li>
                    <li>Anúncios em destaque</li>
                    <li>Duração de 15 dias</li>
                </ul>
                <div class="price-box">
                    <span>R$ 100,00</span> / 15 dias
                </div>

                <div class="pix-area">
                    <p>Pague via PIX:</p>
                    <!-- Chave segura carregada via JS -->
                    <code id="pixKey">Carregando...</code>
                    <button id="btn-copy-pix" class="btn-secondary">Copiar Chave</button>
                </div>

                <button id="btn-request-premium" class="btn-primary">Já fiz o pagamento</button>
            </div>
        </div>

    </div>

    <!-- Navegação Inferior -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="screen-home">Início</button>
        <button class="nav-item" data-target="screen-publish">Publicar</button>
        <button class="nav-item" data-target="screen-premium">Premium</button>
        <button class="nav-item" data-target="screen-profile">Perfil</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
